name: Advanced Release Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Dockerfile'
      - 'bot.py'
      - 'requirements.txt'
      - 'src/**'
      - '.github/workflows/**'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      # -----------------------
      # 读取当前版本
      # -----------------------
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT

      # -----------------------
      # 计算新版本
      # -----------------------
      - name: Bump version
        id: bump
        run: |
          VERSION=${{ steps.version.outputs.current_version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))

          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            CHANNEL="stable"
            echo "$NEW_VERSION" > VERSION
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.$SHORT_SHA"
            CHANNEL="beta"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      # -----------------------
      # 生成 Changelog
      # -----------------------
      - name: Generate Changelog
        id: changelog
        run: |
          LOG=$(git log -10 --pretty=format:"- %s")
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$LOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -----------------------
      # 提交版本（stable）
      # -----------------------
      - name: Commit version
        if: steps.bump.outputs.channel == 'stable'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add VERSION
          git commit -m "release: v${{ steps.bump.outputs.new_version }}"
          git push

      # -----------------------
      # 打 Tag
      # -----------------------
      - name: Create Tag
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}

      # -----------------------
      # 创建 GitHub Release 页面
      # -----------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: Release v${{ steps.bump.outputs.new_version }}
          body: |
            ## 🚀 更新内容
            ${{ env.CHANGELOG }}

            Channel: ${{ steps.bump.outputs.channel }}

      # -----------------------
      # Docker 构建准备
      # -----------------------
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------
      # 构建镜像
      # -----------------------
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/telegram-saver:${{ steps.bump.outputs.new_version }}
            ghcr.io/${{ github.repository_owner }}/telegram-saver:${{ steps.bump.outputs.channel }}
            ghcr.io/${{ github.repository_owner }}/telegram-saver:dev-${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/telegram-saver:${{ steps.bump.outputs.new_version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/telegram-saver:${{ steps.bump.outputs.channel }}